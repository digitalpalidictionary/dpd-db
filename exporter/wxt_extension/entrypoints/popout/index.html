<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DPD — Dictionary</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #eaf6fc;
      }
      /* Make the reused in-page panel fill the whole popout window. */
      #dict-panel-25445 {
        position: static !important;
        left: auto !important;
        right: auto !important;
        top: auto !important;
        bottom: auto !important;
        width: 100% !important;
        min-width: 0 !important;
        max-width: none !important;
        height: 100vh !important;
        border-left: none !important;
        border-right: none !important;
      }
      /* No edge-resize inside a real OS window (the window frame resizes it). */
      #dict-panel-25445 .dpd-resize-handle {
        display: none !important;
      }
      /* Never collapse to the minimized sliver in the popout. */
      #dict-panel-25445.dpd-minimized {
        width: 100% !important;
      }
    </style>
    <script type="module" src="./main.ts"></script>
  </head>
  <body></body>
</html>
